name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4.2.2

      - uses: github/codeql-action/init@d1eb1207b45130d2edf64a0aa1c93be23510592f # v3.26.14
        with:
          languages: 'javascript-typescript'

      - uses: github/codeql-action/autobuild@d1eb1207b45130d2edf64a0aa1c93be23510592f # v3.26.14

      - uses: github/codeql-action/analyze@d1eb1207b45130d2edf64a0aa1c93be23510592f # v3.26.14
